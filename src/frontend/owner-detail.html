<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Owner - Andate Silver</title>
  <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      padding: 0;
      font-size: 14px;
    }
    h1, h2, h3, h4, h5, h6, .title { font-size: 12px; }
    .nes-btn { font-size: 12px; }

    /* Navbar */
    .navbar {
      background-color: #209cee;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 4px 4px 0 #000;
    }
    .navbar-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
      font-size: 0.7rem;
      text-decoration: none;
    }
    .navbar-brand:hover { color: #f7d51d; }
    .navbar-menu {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .navbar-item { position: relative; }
    .navbar-link {
      color: white;
      text-decoration: none;
      font-size: 0.55rem;
      padding: 0.5rem 0.8rem;
      display: inline-block;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .navbar-link:hover { background-color: #f7d51d; color: #212529; border-color: #000; }
    .navbar-link.active { background-color: white; color: #209cee; border-color: #000; }

    /* Layout */
    .container-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem 2rem 1rem;
    }
    .content-wrapper { padding: 0 0.5rem; }

    /* Back button */
    .back-section { margin-bottom: 1.5rem; }

    /* Owner header */
    .owner-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .owner-name {
      color: #209cee;
      font-size: 1rem;
      margin: 0.5rem 0 0.8rem 0;
      word-break: break-word;
    }
    .owner-subtitle {
      font-size: 0.45rem;
      color: #666;
    }

    /* Stat cards row */
    .cards-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: white;
      border: 4px solid #000;
      box-shadow: 4px 4px 0 #000;
      padding: 1rem;
      text-align: center;
    }
    .stat-card-icon { margin-bottom: 0.8rem; display: block; text-align: center; }
    .stat-card-value { font-size: 1.1rem; color: #209cee; display: block; margin-bottom: 0.4rem; word-break: break-all; }
    .stat-card-label { font-size: 0.45rem; color: #555; display: block; line-height: 1.8; }
    .stat-card.gold   { border-color: #f7d51d; box-shadow: 4px 4px 0 #f7d51d; }
    .stat-card.green  { border-color: #92cc41; box-shadow: 4px 4px 0 #92cc41; }
    .stat-card.blue   { border-color: #209cee; box-shadow: 4px 4px 0 #209cee; }
    .stat-card.red    { border-color: #e76e55; box-shadow: 4px 4px 0 #e76e55; }

    /* Section titles */
    .section { margin-bottom: 2rem; }
    .section-title {
      font-size: 0.65rem;
      margin-bottom: 1rem;
      color: #333;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Data list */
    .data-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .data-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.8rem;
      border: 2px solid #000;
      background: white;
      transition: background 0.15s;
    }
    .data-row:hover { background: #fffde0; }
    .data-row.champ-row { border-color: #f7d51d; background: #fffde0; }
    .dr-rank {
      min-width: 44px;
      text-align: center;
      flex-shrink: 0;
      font-size: 0.42rem;
    }
    .dr-main { flex: 1 1 100px; min-width: 0; }
    .dr-name {
      font-size: 0.52rem;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dr-sub { font-size: 0.38rem; color: #888; margin-top: 2px; }
    .dr-stats {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-shrink: 0;
    }
    .dr-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 34px;
    }
    .dr-stat-val { font-size: 0.52rem; font-weight: bold; }
    .dr-stat-lbl { font-size: 0.32rem; color: #888; }
    .wins-bar-bg {
      width: 50px;
      height: 6px;
      background: #eee;
      border: 1px solid #ccc;
      flex-shrink: 0;
    }
    .wins-bar-fill { height: 100%; background: #92cc41; }

    /* Loading / error */
    .loading-text {
      text-align: center;
      padding: 3rem;
      font-size: 0.55rem;
      color: #888;
    }
    .error-text {
      text-align: center;
      padding: 2rem;
      font-size: 0.55rem;
      color: #e76e55;
    }

    /* Year badge */
    .year-badge {
      background: #f7d51d;
      color: #000;
      padding: 2px 6px;
      border: 2px solid #000;
      font-size: 0.4rem;
      display: inline-block;
    }

    /* Two-column sections layout */
    .two-col-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    .two-col-sections .section { margin-bottom: 0; }

    /* Responsive */
    @media (max-width: 700px) {
      .cards-row { grid-template-columns: repeat(2, 1fr); }
      .stat-card-value { font-size: 0.85rem; }
      .two-col-sections { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .navbar-content { flex-direction: row; align-items: center; justify-content: space-between; }
      .navbar-menu { gap: 0.5rem; }
      .navbar-link { font-size: 0.45rem; padding: 0.4rem 0.6rem; }
      .dr-stats { gap: 0.3rem; }
      .dr-name { font-size: 0.45rem; }
      .wins-bar-bg { display: none; }
      .owner-name { font-size: 0.75rem; }
      .cards-row { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/" class="navbar-brand">
        <span>ESPN Fantasy Stats</span>
      </a>
      <ul class="navbar-menu">
        <li class="navbar-item">
          <a href="/" class="navbar-link">Dashboard</a>
        </li>
        <li class="navbar-item">
          <a href="/history.html" class="navbar-link">Historial</a>
        </li>
        <li class="navbar-item">
          <a href="/teams.html" class="navbar-link active">Equipos</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container-main content-wrapper">

    <!-- Back -->
    <div class="back-section">
      <button type="button" class="nes-btn" onclick="window.location.href='/teams.html'">&lt; Equipos</button>
    </div>

    <!-- Loading state -->
    <div id="loading" class="loading-text">
      <span class="nes-text is-warning">Cargando owner...</span>
    </div>

    <!-- Error state -->
    <div id="error-msg" class="error-text" style="display:none;"></div>

    <!-- Content (hidden until loaded) -->
    <div id="owner-content" style="display:none;">

      <!-- Header -->
      <div class="owner-header">
        <h1 class="owner-name" id="owner-name">—</h1>
        <p class="owner-subtitle" id="owner-subtitle">Estadísticas históricas</p>
      </div>

      <!-- Summary Cards -->
      <div class="cards-row">
        <div class="stat-card gold">
          <span class="stat-card-icon"><i class="nes-icon coin"></i></span>
          <span class="stat-card-value" id="stat-seasons">—</span>
          <span class="stat-card-label">TEMPORADAS</span>
        </div>
        <div class="stat-card green">
          <span class="stat-card-icon"><i class="nes-icon like"></i></span>
          <span class="stat-card-value" id="stat-wins">—</span>
          <span class="stat-card-label">VICTORIAS</span>
        </div>
        <div class="stat-card blue">
          <span class="stat-card-icon"><i class="nes-icon star"></i></span>
          <span class="stat-card-value" id="stat-pct">—</span>
          <span class="stat-card-label">WIN %</span>
        </div>
        <div class="stat-card red">
          <span class="stat-card-icon"><i class="nes-icon trophy"></i></span>
          <span class="stat-card-value" id="stat-champs">—</span>
          <span class="stat-card-label">CAMPEONATOS</span>
        </div>
      </div>

      <!-- Season History + Top Players: two-column on desktop -->
      <div class="two-col-sections">

        <!-- Season History -->
        <div class="section nes-container is-rounded with-title">
          <p class="title"><i class="nes-icon star is-small"></i> Historial por Temporada</p>
          <div id="season-history" class="loading-text">
            <span class="nes-text is-warning">Cargando...</span>
          </div>
        </div>

        <!-- Top Players -->
        <div class="section nes-container is-rounded with-title">
          <p class="title"><i class="nes-icon coin is-small"></i> Top Jugadores</p>
          <div id="top-players" class="loading-text">
            <span class="nes-text is-warning">Cargando...</span>
          </div>
        </div>

      </div><!-- /two-col-sections -->

    </div><!-- /owner-content -->
  </div>

  <script src="js/owner-detail.js?v=1"></script>
</body>
</html>
