<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Equipos - Andate Silver</title>
  <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      padding: 0;
      font-size: 14px;
    }
    h1, h2, h3, h4, h5, h6, .title { font-size: 12px; }
    .nes-btn { font-size: 12px; }

    /* Navbar */
    .navbar {
      background-color: #209cee;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 4px 4px 0 #000;
    }
    .navbar-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
      font-size: 0.7rem;
      text-decoration: none;
    }
    .navbar-brand:hover { color: #f7d51d; }
    .navbar-menu {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .navbar-item { position: relative; }
    .navbar-link {
      color: white;
      text-decoration: none;
      font-size: 0.55rem;
      padding: 0.5rem 0.8rem;
      display: inline-block;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .navbar-link:hover { background-color: #f7d51d; color: #212529; border-color: #000; }
    .navbar-link.active { background-color: white; color: #209cee; border-color: #000; }

    .dropdown { position: relative; }
    .dropdown-toggle {
      cursor: pointer;
      color: white;
      font-size: 0.55rem;
      padding: 0.5rem 0.8rem;
      display: inline-block;
      border: 2px solid transparent;
      background: none;
      font-family: 'Press Start 2P', cursive;
    }
    .dropdown-toggle:hover { background-color: #f7d51d; color: #212529; border-color: #000; }
    .dropdown-toggle.active { background-color: white; color: #209cee; border-color: #000; }
    .dropdown-toggle::after { content: ' ▼'; font-size: 0.4rem; }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: white;
      border: 4px solid #000;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
      min-width: 200px;
      z-index: 1000;
      margin-top: 0.5rem;
      padding: 0.5rem 0;
      max-height: 60vh;
      overflow-y: auto;
    }
    .dropdown-menu.show { display: block; }
    .dropdown-item {
      display: block;
      padding: 0.6rem 1rem;
      color: #212529;
      text-decoration: none;
      font-size: 0.5rem;
    }
    .dropdown-item:hover { background-color: #92cc41; color: white; }
    .dropdown-divider { height: 2px; background-color: #000; margin: 0.5rem 0; }

    /* Layout */
    .container-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem 2rem 1rem;
    }
    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .page-title {
      font-size: 1rem;
      margin-bottom: 0.8rem;
      color: #209cee;
    }
    .page-subtitle {
      font-size: 0.45rem;
      color: #666;
    }

    /* Tabs */
    .tabs-container { margin-bottom: 2rem; }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .tab-button {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.5rem;
      padding: 0.7rem 1rem;
      background-color: white;
      border: 4px solid #000;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-button:hover { background-color: #f7d51d; transform: translateY(-2px); }
    .tab-button.active { background-color: #209cee; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 2rem;
      font-size: 0.5rem;
      color: #888;
    }

    /* Data list */
    .data-list { display: flex; flex-direction: column; gap: 0.3rem; }
    .data-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.8rem;
      border: 2px solid #000;
      background: white;
      transition: background 0.15s;
    }
    .data-row.clickable { cursor: pointer; }
    .data-row.clickable:hover { background: #fffde0; border-color: #209cee; }
    .dr-rank {
      min-width: 32px;
      text-align: center;
      flex-shrink: 0;
      font-size: 0.42rem;
    }
    .dr-main { flex: 1 1 100px; min-width: 0; }
    .dr-name {
      font-size: 0.52rem;
      font-weight: bold;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dr-sub { font-size: 0.38rem; color: #888; margin-top: 2px; }
    .dr-stats {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-shrink: 0;
    }
    .dr-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 34px;
    }
    .dr-stat-val { font-size: 0.52rem; font-weight: bold; }
    .dr-stat-lbl { font-size: 0.32rem; color: #888; }
    .wins-bar-bg {
      width: 50px;
      height: 6px;
      background: #eee;
      border: 1px solid #ccc;
      flex-shrink: 0;
    }
    .wins-bar-fill { height: 100%; background: #92cc41; }

    /* Rank badge */
    .rank-gold   { background: #f7d51d; color: #000; padding: 2px 5px; border: 2px solid #000; font-size: 0.4rem; }
    .rank-silver { background: #ccc;    color: #000; padding: 2px 5px; border: 2px solid #000; font-size: 0.4rem; }
    .rank-bronze { background: #cd7f32; color: #fff; padding: 2px 5px; border: 2px solid #000; font-size: 0.4rem; }

    /* Responsive */
    @media (min-width: 769px) {
      .tabs { display: none; }
      .tab-panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        align-items: start;
      }
      .tab-panels .tab-content { display: block !important; }
    }
    @media (max-width: 768px) {
      .tab-panels { display: contents; }
      .navbar-content { flex-direction: row; align-items: center; justify-content: space-between; }
      .navbar-menu { gap: 0.5rem; }
      .navbar-link { font-size: 0.45rem; padding: 0.4rem 0.6rem; }
      .dr-stats { gap: 0.3rem; }
      .dr-name { font-size: 0.45rem; }
      .wins-bar-bg { display: none; }
      .page-title { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/" class="navbar-brand">
        <span>ESPN Fantasy Stats</span>
      </a>
      <ul class="navbar-menu">
        <li class="navbar-item">
          <a href="/" class="navbar-link">Dashboard</a>
        </li>
        <li class="navbar-item">
          <a href="/history.html" class="navbar-link">Historial</a>
        </li>
        <li class="navbar-item dropdown">
          <button class="dropdown-toggle active" onclick="toggleDropdown('teams-dropdown')">Equipos</button>
          <div class="dropdown-menu" id="teams-dropdown">
            <a class="dropdown-item" href="/teams.html">— Ver todos —</a>
            <div class="dropdown-divider"></div>
            <div id="teams-dropdown-list"><span style="padding:0.5rem 1rem;font-size:0.4rem;display:block;">Cargando...</span></div>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container-main">
    <div class="page-header">
      <h1 class="page-title">
        <i class="nes-icon star is-small"></i>
        Equipos y Owners
      </h1>
      <p class="page-subtitle">Todos los dueños de la liga · 2020–2026</p>
    </div>

    <!-- Tabs -->
    <div class="tabs-container">
      <div class="tabs">
        <button class="tab-button active" onclick="switchTab('owners', event)">
          <i class="nes-icon star is-small"></i> Owners
        </button>
        <button class="tab-button" onclick="switchTab('season', event)">
          <i class="nes-icon trophy is-small"></i> Temporada 2026
        </button>
      </div>

      <!-- Tab panels (side-by-side on desktop, stacked on mobile) -->
      <div class="tab-panels">

        <!-- Owners Tab -->
        <div id="tab-owners" class="tab-content active">
          <div class="nes-container is-rounded with-title">
            <p class="title"><i class="nes-icon star is-small"></i> Historial de Owners</p>
            <div id="owners-list" class="loading">
              <span class="nes-text is-warning">Cargando owners...</span>
            </div>
          </div>
        </div>

        <!-- Season 2026 Tab -->
        <div id="tab-season" class="tab-content">
          <div class="nes-container is-rounded with-title">
            <p class="title"><i class="nes-icon trophy is-small"></i> Standings 2026</p>
            <div id="season-list" class="loading">
              <span class="nes-text is-warning">Cargando temporada...</span>
            </div>
          </div>
        </div>

      </div><!-- /tab-panels -->
    </div>
  </div>

  <script>
    function toggleDropdown(id) {
      const dropdown = document.getElementById(id);
      document.querySelectorAll('.dropdown-menu').forEach(dd => {
        if (dd.id !== id) dd.classList.remove('show');
      });
      dropdown.classList.toggle('show');
    }
    document.addEventListener('click', function(event) {
      if (!event.target.matches('.dropdown-toggle')) {
        document.querySelectorAll('.dropdown-menu').forEach(dd => dd.classList.remove('show'));
      }
    });
    fetch('/api/analytics/all-teams')
      .then(r => r.json())
      .then(teams => {
        const list = document.getElementById('teams-dropdown-list');
        if (!list) return;
        list.innerHTML = teams.map(t =>
          `<a class="dropdown-item" href="/owner-detail.html?owner=${encodeURIComponent(t.owner)}">${t.team_name}</a>`
        ).join('');
      })
      .catch(() => {
        const list = document.getElementById('teams-dropdown-list');
        if (list) list.innerHTML = '';
      });
  </script>
  <script src="js/teams.js?v=1"></script>
</body>
</html>
