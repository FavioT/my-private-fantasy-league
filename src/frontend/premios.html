<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <title>Premios - Andate Silver</title>
  <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      padding: 0;
      font-size: 14px;
      background: #f7f7f7;
    }
    h1, h2, h3, h4, h5, h6, .title { font-size: 12px; }
    .nes-btn { font-size: 12px; }

    .navbar {
      background-color: #209cee;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 4px 4px 0 #000;
    }
    .navbar-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
      font-size: 0.7rem;
      text-decoration: none;
    }
    .navbar-brand:hover { color: #f7d51d; }
    .navbar-menu {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .navbar-item { position: relative; }
    .navbar-link {
      color: white;
      text-decoration: none;
      font-size: 0.55rem;
      padding: 0.5rem 0.8rem;
      display: inline-block;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .navbar-link:hover { background-color: #f7d51d; color: #212529; border-color: #000; }
    .navbar-link.active { background-color: white; color: #209cee; border-color: #000; }

    .dropdown { position: relative; }
    .dropdown-toggle {
      cursor: pointer;
      color: white;
      font-size: 0.55rem;
      padding: 0.5rem 0.8rem;
      display: inline-block;
      border: 2px solid transparent;
      background: none;
      font-family: 'Press Start 2P', cursive;
    }
    .dropdown-toggle:hover { background-color: #f7d51d; color: #212529; border-color: #000; }
    .dropdown-toggle::after { content: ' ▼'; font-size: 0.4rem; }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: white;
      border: 4px solid #000;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
      min-width: 200px;
      z-index: 1000;
      margin-top: 0.5rem;
      padding: 0.5rem 0;
      max-height: 60vh;
      overflow-y: auto;
    }
    .dropdown-menu.show { display: block; }
    .dropdown-item {
      display: block;
      padding: 0.6rem 1rem;
      color: #212529;
      text-decoration: none;
      font-size: 0.5rem;
    }
    .dropdown-item:hover { background-color: #92cc41; color: white; }
    .dropdown-divider { height: 2px; background-color: #000; margin: 0.5rem 0; }

    .container-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem 2rem 1rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .page-title {
      font-size: 1rem;
      margin: 0 0 0.7rem 0;
      color: #209cee;
    }
    .page-subtitle {
      font-size: 0.58rem;
      color: #666;
      margin: 0;
      line-height: 1.8;
    }

    .season-strip {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .awards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .award-card {
      background: white;
      border: 4px solid #000;
      box-shadow: 4px 4px 0 #000;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      min-height: 280px;
    }
    .award-card.gold { border-color: #f7d51d; box-shadow: 4px 4px 0 #f7d51d; }
    .award-card.green { border-color: #92cc41; box-shadow: 4px 4px 0 #92cc41; }
    .award-card.blue { border-color: #209cee; box-shadow: 4px 4px 0 #209cee; }
    .award-card.red { border-color: #e76e55; box-shadow: 4px 4px 0 #e76e55; }
    .award-card.purple { border-color: #8a5bd6; box-shadow: 4px 4px 0 #8a5bd6; }

    .award-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .award-title {
      font-size: 0.72rem;
      margin: 0;
      line-height: 1.6;
      color: #222;
    }
    .award-subtitle {
      font-size: 0.54rem;
      color: #666;
      margin: 0;
      line-height: 1.6;
    }

    .winner-name {
      font-size: 0.80rem;
      color: #209cee;
      margin: 0;
      line-height: 1.6;
      word-break: break-word;
    }
    .winner-sub {
      font-size: 0.54rem;
      color: #555;
      line-height: 1.7;
      margin: 0;
    }
    .winner-reason {
      font-size: 0.54rem;
      color: #444;
      line-height: 1.7;
      margin: 0;
      border-top: 2px dashed #ccc;
      padding-top: 0.5rem;
    }

    .metrics-row {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .metric-badge {
      border: 2px solid #000;
      padding: 0.2rem 0.35rem;
      font-size: 0.48rem;
      background: #fffde0;
      line-height: 1.6;
    }

    .finalists {
      border-top: 2px dashed #ccc;
      padding-top: 0.45rem;
    }
    .finalists-title {
      font-size: 0.46rem;
      color: #777;
      margin: 0 0 0.35rem 0;
    }
    .finalist-item {
      font-size: 0.52rem;
      color: #333;
      line-height: 1.7;
      margin: 0;
    }

    .winner-link {
      text-decoration: none;
      display: inline-block;
    }

    .methodology {
      margin-top: 1.2rem;
    }
    .methodology li {
      font-size: 0.55rem;
      line-height: 1.8;
      margin-bottom: 0.3rem;
    }

    .loading, .error, .empty {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.62rem;
    }

    @media (max-width: 1024px) {
      .awards-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .navbar-menu { gap: 0.5rem; }
      .navbar-link, .dropdown-toggle { font-size: 0.45rem; padding: 0.4rem 0.6rem; }
      .container-main { padding: 0 0.6rem 1rem 0.6rem; }
      .page-title { font-size: 0.75rem; }
      .award-card { min-height: 0; }
      .award-title { font-size: 0.62rem; }
      .award-subtitle { font-size: 0.46rem; }
      .winner-name { font-size: 0.68rem; }
      .winner-sub, .winner-reason { font-size: 0.46rem; }
      .metric-badge { font-size: 0.42rem; }
      .finalist-item { font-size: 0.44rem; }
      .methodology li { font-size: 0.48rem; }
      .awards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/" class="navbar-brand">
        <span>ESPN Fantasy Stats</span>
      </a>
      <ul class="navbar-menu">
        <li class="navbar-item">
          <a href="/" class="navbar-link">Dashboard</a>
        </li>
        <li class="navbar-item">
          <a href="/history.html" class="navbar-link">Historial</a>
        </li>
        <li class="navbar-item">
          <a href="/premios.html" class="navbar-link active">Premios</a>
        </li>
        <li class="navbar-item dropdown">
          <button class="dropdown-toggle" onclick="toggleDropdown('teams-dropdown')">Equipos</button>
          <div class="dropdown-menu" id="teams-dropdown">
            <a class="dropdown-item" href="/teams.html">— Ver todos —</a>
            <div class="dropdown-divider"></div>
            <div id="teams-dropdown-list"><span style="padding:0.5rem 1rem;font-size:0.4rem;display:block;">Cargando...</span></div>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container-main">
    <div class="page-header">
      <h1 class="page-title"><i class="nes-icon trophy"></i> Premios Fantasy</h1>
      <p class="page-subtitle">Awards temporada 2026 inspirados en la NBA, con métricas fantasy de la liga.</p>
    </div>

    <div class="season-strip">
      <span class="nes-badge"><span class="is-dark" id="season-pill">SEASON 2026</span></span>
      <span class="nes-badge"><span class="is-warning" id="compare-pill">VS 2025</span></span>
      <button type="button" class="nes-btn is-primary" id="reload-btn">Actualizar</button>
    </div>

    <div id="awards-loading" class="loading">
      <span class="nes-text is-warning">Cargando premios...</span>
    </div>

    <div id="awards-error" class="error" style="display:none;"></div>

    <div id="awards-empty" class="empty" style="display:none;">
      <span class="nes-text is-disabled">No hay premios para mostrar.</span>
    </div>

    <div id="awards-content" style="display:none;">
      <div class="awards-grid" id="awards-grid"></div>

      <div class="nes-container is-rounded with-title methodology">
        <p class="title">Metodología</p>
        <ul id="methodology-list"></ul>
      </div>
    </div>
  </div>

  <script>
    function toggleDropdown(id) {
      const dropdown = document.getElementById(id);
      document.querySelectorAll('.dropdown-menu').forEach(dd => {
        if (dd.id !== id) dd.classList.remove('show');
      });
      dropdown.classList.toggle('show');
    }
    document.addEventListener('click', function(event) {
      if (!event.target.matches('.dropdown-toggle')) {
        document.querySelectorAll('.dropdown-menu').forEach(dd => dd.classList.remove('show'));
      }
    });
    fetch('/api/analytics/all-teams')
      .then(r => r.json())
      .then(teams => {
        const list = document.getElementById('teams-dropdown-list');
        if (!list) return;
        const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        list.innerHTML = teams.map(t =>
          `<a class="dropdown-item" href="/owner-detail.html?owner=${encodeURIComponent(t.owner)}">${esc(t.team_name)}</a>`
        ).join('');
      })
      .catch(() => {
        const list = document.getElementById('teams-dropdown-list');
        if (list) list.innerHTML = '';
      });
  </script>
  <script src="js/premios.js?v=1"></script>
</body>
</html>
